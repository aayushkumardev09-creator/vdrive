name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type Check
      run: npm run lint

    - name: Build
      run: npm run build
      env:
        # Mock env vars needed for CI build to succeed
        VITE_SUPABASE_URL: "https://mock.supabase.co"
        VITE_SUPABASE_ANON_KEY: "mock-anon-key"
        VITE_DRIVEMAIL_SYNC_WEBHOOK_URL: "https://mock.webhook.url"
        VITE_SUBMISSION_WEBHOOK_URL: "https://mock.webhook.url"
