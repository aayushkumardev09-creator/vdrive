name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Clear npm cache and node_modules
        run: |
          npm cache clean --force
          rm -rf node_modules package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          npm_config_build_from_source: true

      - name: Type Check
        run: npm run lint
        continue-on-error: false

      - name: Build project
        run: npm run build
        continue-on-error: false
        env:
          VITE_SUPABASE_URL: "https://mock.supabase.co"
          VITE_SUPABASE_ANON_KEY: "mock-anon-key"
          VITE_DRIVEMAIL_SYNC_WEBHOOK_URL: "https://mock.webhook.url"
          VITE_SUBMISSION_WEBHOOK_URL: "https://mock.webhook.url"

  code-quality:
    runs-on: ubuntu-latest
    needs: build-and-lint
    
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Clear npm cache
        run: |
          npm cache clean --force
          rm -rf node_modules package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          npm_config_build_from_source: true

      - name: Run ESLint
        run: npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings 10
        continue-on-error: true

      - name: Check Prettier formatting
        run: npx prettier --check "src/**/*.{ts,tsx,jsx,js}" || true
        continue-on-error: true

      - name: Type check with TypeScript
        run: npx tsc --noEmit
        continue-on-error: false
